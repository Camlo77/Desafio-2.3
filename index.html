<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon TGC</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script
      src="https://kit.fontawesome.com/7e95bd63f0.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="grid-container">
      <nav>
        <div class="logo">
          <img src="./assets/img/pokeball.png" alt="logo pokeball" />
          <h2>Centro pokemon TGC</h2>
        </div>
        <i class="fa-solid fa-bars"></i>
        <ul>
          <li>1ra generacion</li>
          <li>2da generacion</li>
          <li>3ra generacion</li>
          <li>4ta generacion</li>
          <li>5ta generacion</li>
        </ul>
      </nav>
      <header>
        <p>Filtrar por:</p>
        <div class="box-logo">
          Precio <i class="fa-solid fa-angle-down"></i>
        </div>
      </header>
      <main>
        <div class="products">
          <article class="card">
            <img src="./assets/img/dragonite.png" alt="Dragonite sar" />
            <h3>Dragonite Mega</h3>
            <p class="space-mono-regular">$999.99</p>
            <button>Comprar</button>
          </article>
          <article class="card">
            <img src="./assets/img/marill.png" alt="Marill" />
            <h3>Marill</h3>
            <p class="space-mono-regular">$39.99</p>
            <button>Comprar</button>
          </article>
          <article class="card">
            <img src="./assets/img/rowlet.png" alt="Rowlet" />
            <h3>Rowlet</h3>
            <p class="space-mono-regular">$49.99</p>
            <button>Comprar</button>
          </article>
          <article class="card">
            <img src="./assets/img/talonflame.png" alt="Talonflame" />
            <h3>Talonflame</h3>
            <p class="space-mono-regular">$79.99</p>
            <button>Comprar</button>
          </article>
          <article class="card">
            <img src="./assets/img/togekiss.png" alt="Togekiss" />
            <h3>Togekiss</h3>
            <p class="space-mono-regular">$129.99</p>
            <button>Comprar</button>
          </article>
          <article class="card">
            <img src="./assets/img/meowth.png" alt="Togekiss" />
            <h3>Togekiss</h3>
            <p class="space-mono-regular">$129.99</p>
            <button>Comprar</button>
          </article>
        </div>
        <div class="paginacion">
          <a href="#"><<</a>
          <a href="#">1</a>
          <a href="#">2</a>
          <a href="#">3</a>
          <a href="#">>></a>
        </div>
      </main>
      <footer>
        <p>
          <a href="https://tcg.pokemon.com/es-es/" target="_blank"
            >@Pokimon.inc</a
          >
        </p>
      </footer>
    </div>
  </body>
</html>
